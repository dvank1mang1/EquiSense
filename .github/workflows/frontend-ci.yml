name: frontend-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # Non-blocking until advisories are triaged; remove continue-on-error to enforce zero high+.
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
