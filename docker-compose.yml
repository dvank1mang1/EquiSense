services:
  postgres:
    image: postgres:16-alpine
    container_name: equisense_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equisense}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: equisense_backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      JOB_QUEUE_BACKEND: postgres
      # Явная подстановка из .env у корня репо (рядом с compose); иначе exec-скрипты не видят ключ.
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      STOOQ_API_KEY: ${STOOQ_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -lc "uv sync --frozen --no-dev && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: equisense_worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      JOB_QUEUE_BACKEND: postgres
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      STOOQ_API_KEY: ${STOOQ_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    volumes:
      - ./backend:/app
      - worker_venv:/app/.venv
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -lc "uv sync --frozen --no-dev && uv run python scripts/job_worker.py --poll-sec 1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: equisense_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      # Host 3002 avoids clash with local `npm run dev` on 3000
      - "3002:3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: equisense_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.2
    container_name: equisense_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  backend_venv:
  worker_venv:
  grafana_data:
